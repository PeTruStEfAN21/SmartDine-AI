{% load static %}
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meniu | A La Carte OS</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts Elegante -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/9c4030b637.js" crossorigin="anonymous"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/general.css' %}">
</head>
<body>

    <!-- Bara nav fixa -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-app">
        <div class="container">
            <a class="navbar-brand brand-font" href="/">A La Carte.</a>
            <div class="ms-auto d-flex gap-3">
                <button class="btn btn-outline-light border-0">
                    <a href="/" class="text-decoration-none text-light">Autentificare</a>
                </button>
                
                <button class="btn" style="background-color: var(--accent-gold); color: var(--primary-dark); font-weight: bold;" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartPanel" aria-controls="cartPanel">
                    <i class="fa-solid fa-receipt"></i> Coș (<span id="cart-count">0</span>)
                </button>
            </div>
        </div>
    </nav>

    <!-- Continutul Principal al Meniului -->
    <div class="container mb-5">
        <div class="d-flex justify-content-between align-items-end mt-4 mb-4">
            <h2 class="brand-font mb-0">Comandă Acum</h2>
            <p class="text-muted mb-0 d-none d-md-block">Alege din selecția noastră premium</p>
        </div>

        <!-- Filtre Categorii -->
        <div class="category-filter">
            <button class="filter-btn active">Toate Produsele</button>
            <button class="filter-btn">Signature Dishes</button>
            <button class="filter-btn">Garnituri</button>
            <button class="filter-btn">Băuturi</button>
        </div>

        <!-- Grila de Produse -->
        <div class="row g-4 mt-2">
            
            {% for produs in produse %}
            <div class="col-12 col-md-6 col-lg-4">
                <div class="product-card">
                    <img src="{{ produs.imagine_url }}" class="product-img" alt="{{ produs.nume }}">
                    <div class="product-body">
                        <h4 class="product-title">{{ produs.nume }}</h4>
                        <p class="product-desc">{{ produs.descriere }}</p>
                        <div class="product-footer">
                            <span class="product-price">{{ produs.pret }} Lei</span>
                            <button class="btn-add-cart" data-id="{{ produs.id }}" data-name="{{ produs.nume }}" data-price="{{ produs.pret }}">+ Adaugă</button>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}

        </div>
    </div>

    <!-- PANOUL LATERAL PENTRU COS (Offcanvas) -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartPanel" aria-labelledby="cartPanelLabel">
        
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title brand-font" id="cartPanelLabel" style="font-size: 1.5rem;">Comanda Ta</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Închide"></button>
        </div>
        
        <div class="offcanvas-body d-flex flex-column">
            
            <!-- Lista de produse din cos injectata prin cart.js -->
            <div class="flex-grow-1 overflow-auto" id="cart-items-container">
            </div>

            <!-- Sectiunea de Total si Buton Checkout -->
            <div class="border-top pt-3 mt-3">
                <div class="d-flex justify-content-between mb-3">
                    <span class="fs-5 text-muted">Total estimat:</span>
                    <span class="fs-4 fw-bold" style="color: var(--primary-dark);" id="cart-total-price">0 Lei</span>
                </div>
                
                <button id="btn-checkout" class="btn w-100" style="background-color: var(--primary-dark); color: var(--accent-gold); padding: 12px; font-size: 1.1rem; border-radius: 12px; font-weight: bold; letter-spacing: 1px;">
                    Trimite Comanda →
                </button>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS pt offcanvas -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Scriptul nostru pentru cos, integrat direct in HTML pentru a evita problemele de cache -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Încărcăm coșul din localStorage sau inițializăm un array gol
            let cart = JSON.parse(localStorage.getItem('alacarte_cart')) || [];

            // 2. Selectăm elementele cheie din interfață
            const cartCountEl = document.getElementById('cart-count');
            const cartItemsContainer = document.getElementById('cart-items-container');
            const cartTotalPrice = document.getElementById('cart-total-price');

            // Randăm coșul imediat ce se încarcă pagina
            renderCart();

            // 3. Adăugarea produselor în coș (din pagina principală)
            document.querySelectorAll('.btn-add-cart').forEach(button => {
                button.addEventListener('click', (e) => {
                    const id = button.getAttribute('data-id');
                    const name = button.getAttribute('data-name');
                    const price = parseFloat(button.getAttribute('data-price'));

                    addToCart(id, name, price);
                    
                    // Deschidem panoul lateral de coș automat pentru a vedea ce s-a adăugat
                    const cartPanelElement = document.getElementById('cartPanel');
                    const cartPanel = bootstrap.Offcanvas.getInstance(cartPanelElement) || new bootstrap.Offcanvas(cartPanelElement);
                    cartPanel.show();
                });
            });

            function addToCart(id, name, price) {
                const existingItem = cart.find(item => item.id === id);
                if (existingItem) {
                    existingItem.quantity += 1; // Creștem cantitatea dacă e deja în coș
                } else {
                    cart.push({ id, name, price, quantity: 1 }); // Produs nou
                }
                saveAndRender();
            }

            // 4. Modificarea cantității din interiorul coșului (+ / -)
            window.updateQuantity = function(id, change) {
                const item = cart.find(item => item.id === id);
                if (item) {
                    item.quantity += change;
                    
                    // Dacă cantitatea ajunge la 0 sau mai puțin, ștergem produsul
                    if (item.quantity <= 0) {
                        removeFromCart(id);
                    } else {
                        saveAndRender();
                    }
                }
            };

            // 5. Ștergerea completă a produselor din coș
            window.removeFromCart = function(id) {
                cart = cart.filter(item => item.id !== id);
                saveAndRender();
            };

            // 6. Salvarea în memoria browserului și actualizarea UI-ului
            function saveAndRender() {
                localStorage.setItem('alacarte_cart', JSON.stringify(cart));
                renderCart();
            }

            // 7. Funcția care desenează produsele în coș
            function renderCart() {
                if (!cartItemsContainer) return;

                // Actualizăm numărul total de produse în butonul de sus
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                if (cartCountEl) cartCountEl.innerText = totalItems;

                // Golim containerul pentru a-l redesena
                cartItemsContainer.innerHTML = '';
                let totalCost = 0;

                if (cart.length === 0) {
                    cartItemsContainer.innerHTML = '<p class="text-muted text-center mt-5">Coșul tău este gol.</p>';
                } else {
                    cart.forEach(item => {
                        const itemTotal = item.price * item.quantity;
                        totalCost += itemTotal;
                        
                        cartItemsContainer.innerHTML += `
                            <div class="d-flex justify-content-between align-items-center mb-3 p-2 border-bottom">
                                <div class="flex-grow-1">
                                    <h6 class="mb-0" style="font-weight: 700;">${item.name}</h6>
                                    <small class="text-muted">${item.price.toFixed(2)} Lei / buc</small>
                                    
                                    <!-- Controale pentru Cantitate -->
                                    <div class="d-flex align-items-center mt-2">
                                        <button class="btn btn-sm btn-outline-secondary px-2 py-0" onclick="updateQuantity('${item.id}', -1)">-</button>
                                        <span class="mx-3 fw-bold">${item.quantity}</span>
                                        <button class="btn btn-sm btn-outline-secondary px-2 py-0" onclick="updateQuantity('${item.id}', 1)">+</button>
                                    </div>
                                </div>
                                
                                <div class="text-end ms-3">
                                    <span class="fw-bold d-block mb-2">${itemTotal.toFixed(2)} Lei</span>
                                    <button class="btn btn-sm btn-outline-danger border-0" onclick="removeFromCart('${item.id}')">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                }

                // Actualizăm prețul total afișat jos
                if (cartTotalPrice) cartTotalPrice.innerText = `${totalCost.toFixed(2)} Lei`;
            }
        });
    </script>

    <!-- Script trimitere comanda catre backend -->
    <script>
        document.getElementById('btn-checkout').addEventListener('click', async () => {
            // Extragem coșul salvat de scriptul tău `cart.js` din localStorage
            const cartItems = JSON.parse(localStorage.getItem('alacarte_cart')) || [];
            
            if (cartItems.length === 0) {
                alert('Coșul este gol!');
                return;
            }

            try {
                const response = await fetch('/plaseaza-comanda/', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({ cart: cartItems })
                });
                const data = await response.json();
                
                if (response.ok) {
                    alert('Comandă plasată cu succes! ID Comandă: ' + data.comanda_id);
                    localStorage.removeItem('alacarte_cart'); // Golim cosul local
                    window.location.reload(); // Reincarcam pagina pentru a goli coșul din UI
                } else {
                    alert('Eroare: ' + data.error);
                }
            } catch (error) {
                console.error(error);
                alert('A apărut o problemă la plasarea comenzii.');
            }
        });
    </script>
</body>
</html>
