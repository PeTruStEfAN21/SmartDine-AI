{% load static %}
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Token CSRF pentru cererile AJAX securizate -->
    <meta name="csrf-token" content="{{ csrf_token }}">
    
    <title>Meniu | A La Carte OS</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts Elegante -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/9c4030b637.js" crossorigin="anonymous"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/general.css' %}">
</head>
<body>

    <!-- Bara nav fixa -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-app">
        <div class="container">
            <a class="navbar-brand brand-font" href="/">A La Carte.</a>
            <div class="ms-auto d-flex gap-3">
                <button class="btn btn-outline-light border-0">
                    <a href="/" class="text-decoration-none text-light">Autentificare</a>
                </button>
                
                <button class="btn" style="background-color: var(--accent-gold); color: var(--primary-dark); font-weight: bold;" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartPanel" aria-controls="cartPanel">
                    <i class="fa-solid fa-receipt"></i> Coș (<span id="cart-count">0</span>)
                </button>
            </div>
        </div>
    </nav>

    <!-- Continutul Principal al Meniului -->
    <div class="container mb-5">
        <div class="d-flex justify-content-between align-items-end mt-4 mb-4">
            <h2 class="brand-font mb-0">Comandă Acum</h2>
            <p class="text-muted mb-0 d-none d-md-block">Alege din selecția noastră premium</p>
        </div>

        <!-- Bara de Căutare -->
        <div class="search-container mb-4">
            <div class="input-group elegant-input-group">
                <span class="input-group-text bg-transparent border-end-0" id="search-addon">
                    <i class="fa-solid fa-magnifying-glass text-muted"></i>
                </span>
                <input type="text" id="searchInput" class="form-control border-start-0 ps-0 shadow-none bg-transparent" placeholder="Caută preparatul dorit..." aria-label="Caută" aria-describedby="search-addon">
            </div>
        </div>

        <!-- Filtre Categorii -->
        <div class="category-filter">
            <button class="filter-btn active">Toate Produsele</button>
            <button class="filter-btn">Signature Dishes</button>
            <button class="filter-btn">Garnituri</button>
            <button class="filter-btn">Băuturi</button>
        </div>

        <!-- Grila de Produse -->
        <div class="row g-4 mt-2">
            
            {% for produs in produse %}
            <div class="col-12 col-md-6 col-lg-4 product-item">
                <div class="product-card">
                    <img src="{{ produs.imagine_url }}" class="product-img" alt="{{ produs.nume }}">
                    <div class="product-body">
                        <h4 class="product-title">{{ produs.nume }}</h4>
                        <p class="product-desc">{{ produs.descriere }}</p>
                        <div class="product-footer">
                            <span class="product-price">{{ produs.pret }} Lei</span>
                            <button class="btn-add-cart" data-id="{{ produs.id }}" data-name="{{ produs.nume }}" data-price="{{ produs.pret }}">+ Adaugă</button>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}

        </div>
    </div>

    <!-- PANOUL LATERAL PENTRU COS (Offcanvas) -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartPanel" aria-labelledby="cartPanelLabel">
        
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title brand-font" id="cartPanelLabel" style="font-size: 1.5rem;">Comanda Ta</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Închide"></button>
        </div>
        
        <div class="offcanvas-body d-flex flex-column">
            
            <!-- Lista de produse din cos injectata prin cart.js -->
            <div class="flex-grow-1 overflow-auto" id="cart-items-container">
            </div>

            <!-- Sectiunea de Total si Buton Checkout -->
            <div class="border-top pt-3 mt-3">
                <div class="d-flex justify-content-between mb-3">
                    <span class="fs-5 text-muted">Total estimat:</span>
                    <span class="fs-4 fw-bold" style="color: var(--primary-dark);" id="cart-total-price">0 Lei</span>
                </div>
                
                <button id="btn-checkout" class="btn w-100" style="background-color: var(--primary-dark); color: var(--accent-gold); padding: 12px; font-size: 1.1rem; border-radius: 12px; font-weight: bold; letter-spacing: 1px;">
                    Trimite Comanda →
                </button>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS pt offcanvas -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Am extras logica in fisierul dedicat cart.js -->
    <!-- Asigura-te ca in setarile tale statice (STATICFILES_DIRS) fisierul este gasit corect -->
    <script src="{% static 'lib/cart.js' %}"></script>

    <!-- Logica pentru Bara de Căutare (Live Search) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            const productItems = document.querySelectorAll('.product-item');

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                productItems.forEach(item => {
                    const title = item.querySelector('.product-title').textContent.toLowerCase();
                    const desc = item.querySelector('.product-desc').textContent.toLowerCase();
                    
                    // Caută termenul în titlul produsului sau în descriere
                    if (title.includes(term) || desc.includes(term)) {
                        item.classList.remove('d-none');
                    } else {
                        item.classList.add('d-none');
                    }
                });
            });
        });
    </script>
</body>
</html>
